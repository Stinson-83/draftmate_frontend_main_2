ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
    # CHANGE_THIS_FOR_AWS: If using HTTPS via cert-manager, uncomment the line below
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    # CHANGE_THIS_FOR_AWS: Replace 'draftmate.test' with your actual production domain (e.g., 'draftmate.in')
    - host: draftde.free.nf
      paths:
        - path: /
          pathType: Prefix
  # CHANGE_THIS_FOR_AWS: To enable HTTPS, replace 'tls: []' with the block below:
  # tls:
  #   - hosts:
  #       - draftmate.in # <-- Your actual domain here
  #     secretName: draftmate-tls-secret
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 4Gi
  requests:
    cpu: 100m
    memory: 1Gi
