# Default values for draftmate.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

frontend:
  replicaCount: 2
  image:
    repository: preetkakdiya/draftmate-frontend
    tag: "110"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  env:
    # Non-sensitive variables
    VITE_CLIENT_ID: "YOUR_GOOGLE_CLIENT_ID"
    VITE_API_BASE_URL: "http://app.draftde.free.nf:8080"
    FRONTEND_URL_DEV: "http://app.draftde.free.nf:8080"
    FRONTEND_URL_PROD: "http://app.draftde.free.nf"
    VITE_CASHFREE_MODE: "sandbox"
    AWS_REGION: "us-east-1"
    S3_BUCKET_NAME: "drafterai"
    S3_BUCKET: "drafterai"
    S3_REGION: "ap-south-1"
    POSTGRES_USER: "lawuser"
    POSTGRES_DB: "postgres"
    POSTGRES_HOST: "db-service"
    POSTGRES_PORT: "5432"
    AUTH_SERVICE_URL: "http://127.0.0.1:8009"
    WEB_SEARCH_MAX_RESULTS: "5"
    PREFERRED_DOMAINS: "indiankanoon.org,legalserviceindia.com,scconline.com,livelaw.in,barandbench.com,sci.gov.in,indiacode.nic.in,ecourts.gov.in"
    LLM_MODE: "fast"
    LLM_PROVIDER: "gemini"
    MEM0_ENABLED: "true"
    SESSION_CACHE_TTL: "30"
    LANGSMITH_PROJECT: "lex-bot-v2"
    SCRAPE_DELAY: "2.5"
    MAX_TOKENS_PER_QUERY: "50000"
    MAX_TOKENS_PER_USER_DAILY: "500000"
    AGENT_TIMEOUT: "30"
    REQUEST_TIMEOUT: "90"
    MAX_QUERY_LENGTH: "2000"
    RATE_LIMIT_RPM: "10"
    CHAT_RETENTION_DAYS: "15"
    MEM0_RETENTION_DAYS: "15"
    TEST_MODE: "0"
    UPLOAD_FOLDER: "./downloaded_files"
    INPUT_JSON: "scraped_data.jsonl"
    INTERACTIVE: "true"
    ENVIRONMENT: "development"
    SMTP_SERVER: "smtp.gmail.com"
    SMTP_PORT: "587"
    SMTP_USERNAME: "draftmateinfo@gmail.com"

backend:
  replicaCount: 1
  image:
    repository: preetkakdiya/draftmate-backend
    tag: "110"
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 8080
    targetPort: 8080
    nodePort: 30080
  services:
    - name: converter
      directory: /app/backend/converter
      command: ["uvicorn", "Converter:app", "--host", "0.0.0.0", "--port", "8080", "--proxy-headers", "--timeout-graceful-shutdown", "15"]
      port: 8000
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 128Mi
    - name: query
      directory: /app/backend/query
      command: ["uvicorn", "Query:app", "--host", "0.0.0.0", "--port", "8080", "--proxy-headers", "--timeout-graceful-shutdown", "15"]
      port: 8001
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 3
        targetCPUUtilizationPercentage: 80
        targetMemoryUtilizationPercentage: 80
      resources:
        limits:
          cpu: 1000m
          memory: 2Gi
        requests:
          cpu: 200m
          memory: 1Gi
    - name: enhance-bot
      directory: /app/backend/Enhance_bot
      command: ["uvicorn", "Enhance:app", "--host", "0.0.0.0", "--port", "8080", "--proxy-headers", "--timeout-graceful-shutdown", "15"]
      port: 8002
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 128Mi
    - name: drafter
      directory: /app/backend/Drafter
      command: ["uvicorn", "Drafter:app", "--host", "0.0.0.0", "--port", "8080", "--proxy-headers", "--timeout-graceful-shutdown", "15"]
      port: 8003
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 128Mi
    - name: lexbot
      directory: /app/backend/Deep_research
      command: ["uvicorn", "lex_bot.app:app", "--host", "0.0.0.0", "--port", "8080", "--proxy-headers", "--timeout-graceful-shutdown", "15"]
      port: 8004
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 3
        targetCPUUtilizationPercentage: 80
        targetMemoryUtilizationPercentage: 80
      resources:
        limits:
          cpu: 1000m
          memory: 2560Mi
        requests:
          cpu: 200m
          memory: 1536Mi
    - name: pdf-editor
      directory: /app/backend/PDF_Editor
      command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8080", "--proxy-headers", "--timeout-graceful-shutdown", "15"]
      port: 8005
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 128Mi
    - name: auth
      directory: /app/backend/login_db
      command: ["uvicorn", "auth:app", "--host", "0.0.0.0", "--port", "8080", "--proxy-headers", "--timeout-graceful-shutdown", "15"]
      port: 8009
      resources:
        limits:
          cpu: 200m
          memory: 256Mi
        requests:
          cpu: 100m
          memory: 128Mi
    - name: notification-service
      directory: /app/backend/Notification
      command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8080", "--proxy-headers", "--timeout-graceful-shutdown", "15"]
      port: 8015
      resources:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 50m
          memory: 64Mi
    - name: subscriptions
      directory: /app/backend/subscriptions
      command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8080", "--proxy-headers", "--timeout-graceful-shutdown", "15"]
      port: 8016
      resources:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 50m
          memory: 64Mi
    - name: case-search
      directory: /app/backend/Case_search
      command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8080", "--proxy-headers", "--timeout-graceful-shutdown", "15"]
      port: 8006
      resources:
        limits:
          cpu: 300m
          memory: 256Mi
        requests:
          cpu: 100m
          memory: 128Mi

  workers:
    - name: lexbot-worker
      directory: /app/backend/Deep_research
      command: ["celery", "-A", "lex_bot.tasks", "worker", "--loglevel=info", "-c", "1"]
      resources:
        limits:
          cpu: 2000m
          memory: 4Gi
        requests:
          cpu: 500m
          memory: 2560Mi
      replicaCount: 1

  env:
    # Non-sensitive variables
    VITE_CLIENT_ID: "YOUR_GOOGLE_CLIENT_ID"
    FRONTEND_URL_DEV: "http://app.draftde.free.nf:8080"
    FRONTEND_URL_PROD: "http://app.draftde.free.nf"
    VITE_CASHFREE_MODE: "sandbox"
    AWS_REGION: "us-east-1"
    S3_BUCKET_NAME: "drafterai"
    S3_BUCKET: "drafterai"
    S3_REGION: "ap-south-1"
    POSTGRES_USER: "lawuser"
    POSTGRES_DB: "postgres"
    POSTGRES_HOST: "db-service"
    POSTGRES_PORT: "5432"
    QDRANT_HOST: "qdrant"
    QDRANT_PORT: "6333"
    AUTH_SERVICE_URL: "http://auth:8009"
    NOTIFICATION_SERVICE_URL: "http://notification-service:8015"
    WEB_SEARCH_MAX_RESULTS: "5"
    PREFERRED_DOMAINS: "indiankanoon.org,legalserviceindia.com,scconline.com,livelaw.in,barandbench.com,sci.gov.in,indiacode.nic.in,ecourts.gov.in"
    LLM_MODE: "fast"
    LLM_PROVIDER: "gemini"
    MEM0_ENABLED: "true"
    SESSION_CACHE_TTL: "30"
    LANGSMITH_PROJECT: "lex-bot-v2"
    SCRAPE_DELAY: "2.5"
    MAX_TOKENS_PER_QUERY: "50000"
    MAX_TOKENS_PER_USER_DAILY: "500000"
    AGENT_TIMEOUT: "30"
    REQUEST_TIMEOUT: "90"
    MAX_QUERY_LENGTH: "2000"
    RATE_LIMIT_RPM: "10"
    CHAT_RETENTION_DAYS: "15"
    MEM0_RETENTION_DAYS: "15"
    TEST_MODE: "0"
    UPLOAD_FOLDER: "./downloaded_files"
    INPUT_JSON: "scraped_data.jsonl"
    INTERACTIVE: "true"
    ENVIRONMENT: "development"
    SMTP_SERVER: "smtp.gmail.com"
    SMTP_PORT: "587"
    SMTP_USERNAME: "draftmateinfo@gmail.com"
    
    # Connection Pooling Limits
    DB_POOL_SIZE: "5"
    DB_MAX_OVERFLOW: "2"

    # Queue Config
    REDIS_HOST: "redis"
    REDIS_PORT: "6379"
    REDIS_URL: "redis://redis:6379/0"
    CELERY_BROKER_URL: "redis://redis:6379/0"
    CELERY_RESULT_BACKEND: "redis://redis:6379/0"

gateway:
  resources:
    limits:
      cpu: 200m
      memory: 64Mi
    requests:
      cpu: 50m
      memory: 32Mi

redis:
  enabled: true
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

qdrant:
  inCluster: true
  image:
    repository: qdrant/qdrant
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 2000m
      memory: 3Gi
    requests:
      cpu: 500m
      memory: 1Gi
  persistence:
    storageClass: ""
    size: 10Gi

affinity:
  ai:
    enabled: false
    nodeLabelKey: workload
    nodeLabelValue: ai
  web:
    enabled: false
    nodeLabelKey: workload
    nodeLabelValue: web

# Secrets - Sensitive environment variables (overridden by values-secrets.yaml)
secrets:
  POSTGRES_PASSWORD: "YOUR_POSTGRES_PASSWORD"
  PSQL_PASSWD: "YOUR_POSTGRES_PASSWORD"
  POSTGRES_DSN: "postgresql://lawuser:YOUR_POSTGRES_PASSWORD@db-service:5432/postgres"
  DATABASE_URL: "postgresql://lawuser:YOUR_POSTGRES_PASSWORD@db-service:5432/postgres"
  GOOGLE_API_KEY: "YOUR_GOOGLE_API_KEY"
  GEMINI_API_KEY: "YOUR_GEMINI_API_KEY"
  OPENAI_API_KEY: "YOUR_OPENAI_API_KEY"
  TAVILY_API_KEY: "YOUR_TAVILY_API_KEY"
  FIRECRAWL_API_KEY: "YOUR_FIRECRAWL_API_KEY"
  FIRECRAWLER_API_KEY: "YOUR_FIRECRAWL_API_KEY"
  SERPER_API_KEY: "YOUR_SERPER_API_KEY"
  GOOGLE_SERP_API_KEY: "YOUR_SERPER_API_KEY"
  LANGSMITH_API_KEY: "YOUR_LANGSMITH_API_KEY"
  AWS_ACCESS_KEY_ID: "YOUR_AWS_ACCESS_KEY_ID"
  AWS_SECRET_ACCESS_KEY: "YOUR_AWS_SECRET_ACCESS_KEY"
  CASHFREE_APP_ID: "YOUR_CASHFREE_APP_ID"
  CASHFREE_SECRET_KEY: "YOUR_CASHFREE_SECRET_KEY"
  GOOGLE_CLIENT_ID: "YOUR_GOOGLE_CLIENT_ID"
  GOOGLE_CLIENT_SECRET: "YOUR_GOOGLE_CLIENT_SECRET"
  SMTP_PASSWORD: "YOUR_SMTP_PASSWORD"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: app.draftde.free.nf
      paths:
        - path: /
          pathType: Prefix
  tls: []
