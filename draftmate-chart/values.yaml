frontend:
  replicaCount: 1
  image:
    repository: preetkakdiya/draftmate-frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    targetPort: 5173
  env:
    VITE_CLIENT_ID: "YOUR_GOOGLE_CLIENT_ID"
    VITE_API_BASE_URL: "http://draftde.free.nf:8080"
    # CHANGE_THIS_FOR_AWS: Update URLs to match your production domain
    FRONTEND_URL_DEV: "http://draftde.free.nf:8080"
    FRONTEND_URL_PROD: "http://draftde.free.nf"
    VITE_CASHFREE_MODE: "sandbox"
    CASHFREE_APP_ID: "YOUR_CASHFREE_APP_ID"
    CASHFREE_SECRET_KEY: "YOUR_CASHFREE_SECRET_KEY"
    AWS_ACCESS_KEY_ID: "YOUR_AWS_ACCESS_KEY_ID"
    AWS_SECRET_ACCESS_KEY: "YOUR_AWS_SECRET_ACCESS_KEY"
    AWS_REGION: "us-east-1"
    S3_BUCKET_NAME: "drafterai"
    S3_BUCKET: "drafterai"
    S3_REGION: "ap-south-1"
    POSTGRES_USER: "lawuser"
    POSTGRES_PASSWORD: "YOUR_POSTGRES_PASSWORD"
    PSQL_PASSWD: "YOUR_POSTGRES_PASSWORD"
    POSTGRES_DB: "postgres"
    POSTGRES_HOST: "db-service"
    POSTGRES_PORT: "5432"
    POSTGRES_DSN: "YOUR_POSTGRES_DSN"
    DATABASE_URL: "YOUR_DATABASE_URL"
    GOOGLE_CLIENT_ID: "YOUR_GOOGLE_CLIENT_ID"
    GOOGLE_CLIENT_SECRET: "YOUR_GOOGLE_CLIENT_SECRET"
    AUTH_SERVICE_URL: "http://127.0.0.1:8009"
    GOOGLE_API_KEY: "YOUR_GOOGLE_API_KEY"
    GEMINI_API_KEY: "YOUR_GEMINI_API_KEY"
    OPENAI_API_KEY: "YOUR_OPENAI_API_KEY"
    TAVILY_API_KEY: "YOUR_TAVILY_API_KEY"
    FIRECRAWL_API_KEY: "YOUR_FIRECRAWL_API_KEY"
    FIRECRAWLER_API_KEY: "YOUR_FIRECRAWLER_API_KEY"
    SERPER_API_KEY: "YOUR_SERPER_API_KEY"
    GOOGLE_SERP_API_KEY: "YOUR_GOOGLE_SERP_API_KEY"
    WEB_SEARCH_MAX_RESULTS: "5"
    PREFERRED_DOMAINS: "indiankanoon.org,legalserviceindia.com,scconline.com,livelaw.in,barandbench.com,sci.gov.in,indiacode.nic.in,ecourts.gov.in"
    LLM_MODE: "fast"
    LLM_PROVIDER: "gemini"
    MEM0_ENABLED: "true"
    SESSION_CACHE_TTL: "30"
    LANGSMITH_API_KEY: "YOUR_LANGSMITH_API_KEY"
    LANGSMITH_PROJECT: "lex-bot-v2"
    SCRAPE_DELAY: "2.5"
    MAX_TOKENS_PER_QUERY: "50000"
    MAX_TOKENS_PER_USER_DAILY: "500000"
    AGENT_TIMEOUT: "30"
    REQUEST_TIMEOUT: "90"
    MAX_QUERY_LENGTH: "2000"
    RATE_LIMIT_RPM: "10"
    CHAT_RETENTION_DAYS: "15"
    MEM0_RETENTION_DAYS: "15"
    TEST_MODE: "0"
    UPLOAD_FOLDER: "./downloaded_files"
    INPUT_JSON: "scraped_data.jsonl"
    INTERACTIVE: "true"
    ENVIRONMENT: "development"
    SMTP_SERVER: "smtp.gmail.com"
    SMTP_PORT: "587"
    SMTP_USERNAME: "draftmateinfo@gmail.com"
    SMTP_PASSWORD: "YOUR_SMTP_PASSWORD"

