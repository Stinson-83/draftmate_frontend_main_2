name: Nightly SonarQube Code Analysis

on:
  workflow_dispatch: 

jobs:
  nightly-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Start SonarQube via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.K8S_SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.K8S_SSH_PRIVATE_KEY }}
          script: |
            sudo sysctl -w vm.max_map_count=262144 || true
            
            # Write Nginx proxy configuration dynamically
            cat << 'EOF' > /home/ubuntu/sonarqube_proxy.conf
            events { worker_connections 1024; }
            http {
                server {
                    listen 9000;
                    server_name ec2-54-221-83-201.compute-1.amazonaws.com;
                    location / {
                        proxy_pass http://127.0.0.1:9001;
                        proxy_set_header Host $host;
                        proxy_set_header X-Real-IP $remote_addr;
                        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    }
                }
                server {
                    listen 9000 default_server;
                    return 403 "Forbidden: Hostname not allowed.";
                }
            }
            EOF

            # Start or run SonarQube on local port 9001
            if sudo docker ps -a --format '{{.Names}}' | grep -Eq "^sonarqube$"; then
                echo "Starting existing SonarQube container..."
                sudo docker start sonarqube
            else
                echo "Creating and starting new SonarQube container..."
                sudo docker run -d --name sonarqube --cpus="1.0" -e SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true -p 127.0.0.1:9001:9000 sonarqube:community
            fi

            # Start or run Nginx proxy on public port 9000
            if sudo docker ps -a --format '{{.Names}}' | grep -Eq "^sonarqube-proxy$"; then
                echo "Starting existing SonarQube proxy..."
                sudo docker start sonarqube-proxy
            else
                echo "Creating and starting new SonarQube proxy..."
                sudo docker run -d --name sonarqube-proxy --network=host -v /home/ubuntu/sonarqube_proxy.conf:/etc/nginx/nginx.conf:ro nginx:alpine
            fi

            echo "Waiting for SonarQube to boot up..."
            sleep 45

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Stop SonarQube via SSH
        if: always()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.K8S_SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.K8S_SSH_PRIVATE_KEY }}
          script: |
            sudo docker stop sonarqube sonarqube-proxy || true
