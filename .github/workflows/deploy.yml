name: DraftMate CI/CD Pipeline

on:
  push:
    branches:
      - main
      - DockerAuto
  workflow_dispatch:

env:
  ECR_IMAGE_NAME: draftmate-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Prevents OOM by not running multiple deployments concurrently
    concurrency: 
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # OWASP Dependency Check (Compute is free on GitHub Actions!)
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'draftmate'
          path: '.'
          format: 'HTML'

      # Upload OWASP Report so you can download it from GitHub Actions UI
      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: OWASP-Report
          path: reports/dependency-check-report.html

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if it does not exist
        run: |
          aws ecr describe-repositories --repository-names ${{ env.ECR_IMAGE_NAME }} || \
          aws ecr create-repository --repository-name ${{ env.ECR_IMAGE_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: backend/models
          key: ${{ runner.os }}-models-${{ hashFiles('backend/download_models.py') }}
          restore-keys: |
            ${{ runner.os }}-models-

      - name: Install dependencies for download_models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: pip install huggingface_hub

      - name: Pre-download models on runner
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: python backend/download_models.py

      - name: Build and Push Monolith
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_IMAGE_NAME }}:${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_CLIENT_ID=462761102428-dnm0f7tmt3dbv0l41aun71k4lj1c9hig.apps.googleusercontent.com
            VITE_CASHFREE_MODE=sandbox
          secrets: |
            "github_token=${{ secrets.GITHUB_TOKEN }}"

      - name: Download Trivy HTML Template
        run: wget https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl

      - name: Run Trivy scan on Monolith image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_IMAGE_NAME }}:${{ github.run_number }}
          format: 'template'
          template: '@html.tpl'
          output: 'trivy-report.html'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Upload Trivy HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: Trivy-HTML-Report
          path: trivy-report.html
