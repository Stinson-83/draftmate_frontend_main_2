name: DraftMate CI/CD Pipeline

on:
  push:
    branches:
      - preet/k8s-setup

env:
  FRONTEND_IMAGE: preetkakdiya/draftmate-frontend
  BACKEND_IMAGE: preetkakdiya/draftmate-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Prevents OOM by not running multiple deployments concurrently
    concurrency: 
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # OWASP Dependency Check (Compute is free on GitHub Actions!)
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'draftmate'
          path: '.'
          format: 'HTML'

      # Upload OWASP Report so you can download it from GitHub Actions UI
      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: OWASP-Report
          path: reports/dependency-check-report.html

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Frontend
        run: |
          docker build \
            --build-arg VITE_CLIENT_ID=462761102428-dnm0f7tmt3dbv0l41aun71k4lj1c9hig.apps.googleusercontent.com \
            --build-arg VITE_API_BASE_URL=http://app.draftde.free.nf:8080 \
            --build-arg VITE_CASHFREE_MODE=sandbox \
            -t $FRONTEND_IMAGE:${{ github.run_number }} -f Dockerfile.frontend .
          docker push $FRONTEND_IMAGE:${{ github.run_number }}

      - name: Build and Push Backend
        run: |
          docker build -t $BACKEND_IMAGE:${{ github.run_number }} -f Dockerfile .
          docker push $BACKEND_IMAGE:${{ github.run_number }}

      - name: Run Trivy scan on Frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.run_number }}
          format: 'table'
          output: 'frontend-trivy.txt'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Run Trivy scan on Backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.run_number }}
          format: 'table'
          output: 'backend-trivy.txt'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Combine Trivy Reports
        run: |
          echo "=========================================" > combined-trivy-report.txt
          echo "      FRONTEND IMAGE VULNERABILITIES     " >> combined-trivy-report.txt
          echo "=========================================" >> combined-trivy-report.txt
          cat frontend-trivy.txt >> combined-trivy-report.txt
          echo "" >> combined-trivy-report.txt
          echo "=========================================" >> combined-trivy-report.txt
          echo "      BACKEND IMAGE VULNERABILITIES      " >> combined-trivy-report.txt
          echo "=========================================" >> combined-trivy-report.txt
          cat backend-trivy.txt >> combined-trivy-report.txt

      - name: Upload Combined Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: Trivy-Combined-Report
          path: combined-trivy-report.txt
          
      - name: Deploy to Kubernetes Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.K8S_SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.K8S_SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/draftmate_frontend_main_2
            git stash
            git pull origin preet/k8s-setup
            /usr/local/bin/helm upgrade --install draftmate ./draftmate-chart \
                -f ./draftmate-chart/values.yaml \
                -f ./draftmate-chart/values-secrets.yaml \
                --set frontend.image.tag=${{ github.run_number }} \
                --set backend.image.tag=${{ github.run_number }}
