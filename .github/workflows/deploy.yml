name: DraftMate CI/CD Pipeline

on:
  push:
    branches:
      - preet/k8s-setup

env:
  FRONTEND_IMAGE: preetkakdiya/draftmate-frontend
  BACKEND_IMAGE: preetkakdiya/draftmate-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Prevents OOM by not running multiple deployments concurrently
    concurrency: 
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # OWASP Dependency Check (Compute is free on GitHub Actions!)
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'draftmate'
          path: '.'
          format: 'HTML'

      # Upload OWASP Report so you can download it from GitHub Actions UI
      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: OWASP-Report
          path: reports/dependency-check-report.html


      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          build-args: |
            VITE_CLIENT_ID=462761102428-dnm0f7tmt3dbv0l41aun71k4lj1c9hig.apps.googleusercontent.com
            VITE_API_BASE_URL=http://app.draftde.free.nf:8080
            VITE_CASHFREE_MODE=sandbox
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Download Trivy HTML Template
        run: wget https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl

      - name: Run Trivy scan on Frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.run_number }}
          format: 'template'
          template: '@html.tpl'
          output: 'frontend-report.html'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Run Trivy scan on Backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.run_number }}
          format: 'template'
          template: '@html.tpl'
          output: 'backend-report.html'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Upload Trivy HTML Reports
        uses: actions/upload-artifact@v4
        with:
          name: Trivy-HTML-Reports
          path: |
            frontend-report.html
            backend-report.html
          
      - name: Deploy to Kubernetes Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.K8S_SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.K8S_SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/draftmate_frontend_main_2
            git stash
            git pull origin preet/k8s-setup
            # --- PRE-DEPLOY CLEANUP: Free up disk space before pulling new images ---
            echo "🧹 Running pre-deploy cleanup..."
            sudo docker system prune -af
            sudo journalctl --vacuum-time=1d
            sudo apt-get clean
            python3 prune_images.py
            
            # --- DEPLOYMENT ---
            echo "🚀 Upgrading Helm release..."
            KUBECONFIG=/home/ubuntu/.kube/config /usr/local/bin/helm upgrade --install draftmate ./draftmate-chart \
                -f ./draftmate-chart/values.yaml \
                -f ./draftmate-chart/values-secrets.yaml \
                --set frontend.image.tag=${{ github.run_number }} \
                --set backend.image.tag=${{ github.run_number }} \
                --history-max 3
            
            # --- POST-DEPLOY CLEANUP: Clean up the old version that is now replaced ---
            echo "🧹 Running post-deploy cleanup..."
            sudo docker system prune -f
            python3 prune_images.py
