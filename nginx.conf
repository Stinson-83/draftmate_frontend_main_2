worker_processes auto;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    client_max_body_size 50M;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream frontend_upstream {
        server frontend:3000;
    }

    upstream drafter_upstream {
        server drafter-service:8003;
    }

    upstream onlyoffice_upstream {
        server onlyoffice-server:80;
    }

    server {
        listen 80;
        server_name _;

        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location /api/ {
            proxy_pass http://drafter_upstream/;
        }

        location ^~ /onlyoffice/ {
            rewrite ^/onlyoffice/(.*) /$1 break;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_pass http://onlyoffice_upstream;
        }

        location = /src {
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_pass http://frontend_upstream;
        }

        location ^~ /src/ {
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_pass http://frontend_upstream;
        }

        location / {
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_pass http://frontend_upstream;
        }
    }
}
