worker_processes auto;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    client_max_body_size 50M;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream drafter_upstream {
        server drafter-service:8003;
    }

    upstream onlyoffice_upstream {
        server onlyoffice-server:80;
    }

    server {
        listen 80;
        server_name _;

        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ONLYOFFICE Document Server coauthoring API routing
        location ^~ /onlyoffice/ {
            rewrite ^/onlyoffice/(.*) /$1 break;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Forwarded-Host $http_host/onlyoffice;
            proxy_pass http://onlyoffice_upstream;
        }

        location /api/drafter/ {
            proxy_pass http://drafter_upstream/;
        }

        # Advocate Profile Service (8007)
        location /advocate-api/ {
            proxy_pass         http://127.0.0.1:8007/;
            proxy_redirect     off;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Host $host;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            client_max_body_size 10M;
        }

        # Legal Workflow Service (8010)
        location /workflow/ {
            proxy_pass         http://127.0.0.1:8010/;
            proxy_redirect     off;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Host $host;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        }

        # Translator Service (8012)
        location /translator/ {
            proxy_pass         http://host.docker.internal:8012/;
            proxy_redirect     off;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Host $host;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        }


        # Developer / Production reverse proxy routes for backend services
        # Uses resolver to prevent Nginx boot failure when container hosts are resolving asynchronously
        location /converter/ {
            proxy_pass http://host.docker.internal:8000/;
        }

        location /query/ {
            proxy_pass http://host.docker.internal:8001/;
        }

        location /enhance/ {
            proxy_pass http://host.docker.internal:8002/;
        }

        location /drafter/ {
            proxy_pass http://host.docker.internal:8003/;
        }

        location /lexbot/ {
            proxy_pass http://host.docker.internal:8004/;
        }

        location /pdf/ {
            proxy_pass http://host.docker.internal:8005/;
        }

        location /auth/ {
            proxy_pass http://host.docker.internal:8009/;
        }

        location /notification/ {
            proxy_pass http://host.docker.internal:8015/;
        }

        location /case_search/ {
            proxy_pass http://host.docker.internal:8006/;
        }



        # Frontend single page application static assets serving or proxy fallback
        location / {
            proxy_pass http://host.docker.internal:5173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location @proxy_to_app {
            resolver 127.0.0.11 valid=30s;
            set $app_target "http://drafter-service:80";
            proxy_pass $app_target;
        }
    }
}
