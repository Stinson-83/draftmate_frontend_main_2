worker_processes auto;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    client_max_body_size 50M;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream drafter_upstream {
        server drafter-service:8003;
    }

    upstream onlyoffice_upstream {
        server onlyoffice-server:80;
    }

    server {
        listen 80;
        server_name _;

        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ONLYOFFICE Document Server coauthoring API routing
        location ^~ /onlyoffice/ {
            rewrite ^/onlyoffice/(.*) /$1 break;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Forwarded-Host $http_host/onlyoffice;
            proxy_pass http://onlyoffice_upstream;
        }

        # Developer / Production reverse proxy routes for backend services
        # Uses resolver to prevent Nginx boot failure when container hosts are resolving asynchronously
        location /converter/ {
            resolver 127.0.0.11 valid=30s;
            set $converter_target "http://drafter-service:8000";
            proxy_pass $converter_target/;
        }

        location /query/ {
            resolver 127.0.0.11 valid=30s;
            set $query_target "http://drafter-service:8001";
            proxy_pass $query_target/;
        }

        location /enhance/ {
            resolver 127.0.0.11 valid=30s;
            set $enhance_target "http://drafter-service:8002";
            proxy_pass $enhance_target/;
        }

        location /drafter/ {
            resolver 127.0.0.11 valid=30s;
            set $drafter_target "http://drafter-service:8003";
            proxy_pass $drafter_target/;
        }

        location /lexbot/ {
            resolver 127.0.0.11 valid=30s;
            set $lexbot_target "http://drafter-service:8004";
            proxy_pass $lexbot_target/;
        }

        location /pdf/ {
            resolver 127.0.0.11 valid=30s;
            set $pdf_target "http://drafter-service:8005";
            proxy_pass $pdf_target/;
        }

        location /auth/ {
            resolver 127.0.0.11 valid=30s;
            set $auth_target "http://drafter-service:8009";
            proxy_pass $auth_target/;
        }

        location /notification/ {
            resolver 127.0.0.11 valid=30s;
            set $notification_target "http://drafter-service:8015";
            proxy_pass $notification_target/;
        }

        location /case_search/ {
            resolver 127.0.0.11 valid=30s;
            set $case_search_target "http://drafter-service:8006";
            proxy_pass $case_search_target/;
        }

        # Legacy backward-compatible mapping for /api/drafter/
        location /api/drafter/ {
            resolver 127.0.0.11 valid=30s;
            set $drafter_legacy_target "http://drafter-service:8003";
            proxy_pass $drafter_legacy_target/;
        }

        # Frontend single page application static assets serving or proxy fallback
        location / {
            root /var/www/html;
            try_files $uri $uri/ /index.html @proxy_to_app;
        }

        location @proxy_to_app {
            resolver 127.0.0.11 valid=30s;
            set $app_target "http://drafter-service:80";
            proxy_pass $app_target;
        }
    }
}
