version: "3.8"

services:
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - drafter-service
      - onlyoffice-server
    networks:
      - draftmate-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      - VITE_API_BASE_URL=http://localhost/api
      - VITE_ONLYOFFICE_URL=http://localhost/onlyoffice
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "3000"]
    expose:
      - "3000"
    volumes:
      - ./:/app
      - /app/node_modules
    networks:
      - draftmate-network
    restart: unless-stopped

  drafter-service:
    build:
      context: ./backend/Drafter
      dockerfile: Dockerfile
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - JWT_SECRET=draftmate_jwt_production_signing_key_2026
      - SHARED_STORAGE_PATH=/var/shared/drafts
    volumes:
      - draftmate_storage_shared:/var/shared/drafts
    expose:
      - "8003"
    networks:
      - draftmate-network
    restart: unless-stopped

  onlyoffice-server:
    image: onlyoffice/documentserver:latest
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=draftmate_jwt_production_signing_key_2026
      - JWT_HEADER=Authorization
      - JWT_IN_BODY=true
    volumes:
      - draftmate_storage_shared:/var/www/onlyoffice/Data/shared
    expose:
      - "80"
    networks:
      - draftmate-network
    restart: unless-stopped

volumes:
  draftmate_storage_shared:
    driver: local

networks:
  draftmate-network:
    driver: bridge
