version: "3.8"

services:
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "drafter-service:host-gateway"
    depends_on:
      - onlyoffice-server
    networks:
      - draftmate-network
    restart: unless-stopped

  onlyoffice-server:
    image: onlyoffice/documentserver:latest
    env_file:
      - .env
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${JWT_SECRET}
      - DEV_BYPASS_AUTH=true
      - JWT_HEADER=Authorization
      - JWT_IN_BODY=true
    volumes:
      - ./shared_drafts:/var/www/onlyoffice/Data/shared
    ports:
      - "8081:80"
    extra_hosts:
      - "drafter-service:host-gateway"
    networks:
      - draftmate-network
    restart: unless-stopped

networks:
  draftmate-network:
    driver: bridge
